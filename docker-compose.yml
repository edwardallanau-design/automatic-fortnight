services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file: .env.docker
    ports:
      - "5433:5432"
    # Ephemeral by design: the Postgres data directory is a tmpfs (RAM-backed), so
    # the database is wiped whenever the container is recreated. Every `docker
    # compose up` starts from an empty DB, which the app entrypoint then migrates
    # and (create-once) seeds — the local instance is a throwaway fixture, never a
    # store of real data. Prod/dev use their own persistent Neon databases.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: "no"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
